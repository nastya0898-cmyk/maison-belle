[build]
  publish = "."

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Pretty URLs without .html
[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200
[[redirects]]
  from = "/booking"
  to = "/booking.html"
  status = 200
[[redirects]]
  from = "/contacts"
  to = "/contacts.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
